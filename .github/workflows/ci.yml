name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.11.2

      - name: Run ruff
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[backend]" pytest==8.3.5

      - name: Run tests
        run: echo "Tests not yet implemented — stub stage"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          tags: fyp-backend:ci
          load: true
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false

      - name: Start backend container
        run: docker run -d --name backend-test -p 8000:8000 fyp-backend:ci

      - name: Check liveness
        run: |
          for i in $(seq 1 5); do
            if curl -sf http://localhost:8000/health/live; then
              echo "Backend is live"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "Backend failed liveness check"
          docker logs backend-test
          exit 1

      - name: Stop backend container
        if: always()
        run: docker stop backend-test && docker rm backend-test
