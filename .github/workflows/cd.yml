name: CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository_owner
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV"

      - name: Build & push backend image 
        uses: docker/build-push-action@v6      
        with: 
          context: .
          file: docker/Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/fyp-backend:latest
            ghcr.io/${{ env.REPO_OWNER }}/fyp-backend:${{ github.sha }}
  
  build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   

      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository_owner
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV"

      - name: Build & push frontend image 
        uses: docker/build-push-action@v6      
        with: 
          context: .
          file: docker/Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/fyp-frontend:latest     
            ghcr.io/${{ env.REPO_OWNER }}/fyp-frontend:${{ github.sha }}