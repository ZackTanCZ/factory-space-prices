name: CI/CD Pipeline (AWS)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint - Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.11.2

      - name: Run ruff
        run: ruff check .

  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[backend]" pytest==8.3.5

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          tags: fyp-backend:ci
          load: true
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false

      - name: Start backend container
        run: docker run -d --name backend-test -p 8000:8000 fyp-backend:ci

      - name: Check liveness
        run: |
          for i in $(seq 1 5); do
            if curl -sf http://localhost:8000/health/live; then
              echo "Backend is live"
              exit 0
            fi
            echo "Waiting... ($i/5)"
            sleep 3
          done
          echo "Backend failed liveness check"
          docker logs backend-test
          exit 1

      - name: Check Predictive Model readiness
        run: |
          for i in $(seq 1 5); do
            if curl -sf http://localhost:8000/health/ready; then
              echo "Predictive model is ready for inference"
              exit 0
            fi
            echo "Waiting... ($i/5)"
            sleep 6
          done
          echo "Backend failed readiness check"
          docker logs backend-test
          exit 1

      - name: Stop backend container
        if: always()
        run: docker stop backend-test && docker rm backend-test


  # ---------------------------------------------------------------------------
  # Deploy permanent stack — ECR repos + IAM roles.
  # Runs on every push to main but CloudFormation only changes resources if the
  # template actually changed (--no-fail-on-empty-changeset).
  # ---------------------------------------------------------------------------
  deploy-infra:
    name: Deploy Permanent Stack
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy permanent stack
        run: |
          aws cloudformation deploy \
            --template-file cfn/permanent.yml \
            --stack-name fyp-permanent \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName=fyp \
              GitHubOrg=${{ github.repository_owner }} \
              GitHubRepo=${{ github.event.repository.name }} \
            --no-fail-on-empty-changeset \
            --region ${{ secrets.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # Build & push backend image to ECR, then deploy to ECS.
  # ECS deploy is skipped silently if the ephemeral stack is torn down
  # (default state between demos). Image is always pushed to ECR so that
  # `make demo-up` picks up the latest image.
  # ---------------------------------------------------------------------------
  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [build, deploy-infra]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names fyp-backend \
            --region ${{ secrets.AWS_REGION }} || \
          (echo "ECR repository fyp-backend does not exist. Deploy cfn/permanent.yml first." && exit 1)

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          build-args: GIT_SHA=${{ github.sha }}
          tags: ${{ secrets.ECR_BACKEND_URI }}:latest

      # ECS deploy steps — skipped when ephemeral stack is torn down.
      # The task definition download fails if the stack doesn't exist,
      # which causes the render and deploy steps to be skipped automatically.
      - name: Download current task definition
        id: download-task-def-backend
        continue-on-error: true
        run: |
          aws ecs describe-task-definition \
            --task-definition fyp-backend \
            --query taskDefinition \
            --region ${{ secrets.AWS_REGION }} \
            > task-def-backend.json

      - name: Render new task definition with updated image
        if: steps.download-task-def-backend.outcome == 'success'
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-backend.json
          container-name: backend
          image: ${{ secrets.ECR_BACKEND_URI }}:latest

      - name: Deploy to ECS and wait for stability
        if: steps.download-task-def-backend.outcome == 'success'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ secrets.ECS_BACKEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ---------------------------------------------------------------------------
  # Build & push frontend image to ECR, then deploy to ECS.
  # Runs in parallel with build-push-backend — independent jobs so a
  # frontend-only change does not trigger a backend redeploy and vice versa.
  # ---------------------------------------------------------------------------
  build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [build, deploy-infra]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names fyp-frontend \
            --region ${{ secrets.AWS_REGION }} || \
          (echo "ECR repository fyp-frontend does not exist. Deploy cfn/permanent.yml first." && exit 1)

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ secrets.ECR_FRONTEND_URI }}:latest

      - name: Download current task definition
        id: download-task-def-frontend
        continue-on-error: true
        run: |
          aws ecs describe-task-definition \
            --task-definition fyp-frontend \
            --query taskDefinition \
            --region ${{ secrets.AWS_REGION }} \
            > task-def-frontend.json

      - name: Render new task definition with updated image
        if: steps.download-task-def-frontend.outcome == 'success'
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-frontend.json
          container-name: frontend
          image: ${{ secrets.ECR_FRONTEND_URI }}:latest

      - name: Deploy to ECS and wait for stability
        if: steps.download-task-def-frontend.outcome == 'success'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ secrets.ECS_FRONTEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
