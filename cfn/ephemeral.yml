AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FYP ephemeral infrastructure — ALB, ECS cluster, ECS services, Cloud Map, security groups.
  Deploy before a demo with `make demo-up`. Delete after with `make demo-down`.
  Only incurs charges while deployed (~$0.23 per 2-hour demo session).

Parameters:
  ProjectName:
    Type: String
    Default: fyp
    Description: Slug used as prefix for all resource names

  TaskExecutionRoleArn:
    Type: String
    Description: ARN of the ECS task execution role (from permanent stack output)

  BackendImageUri:
    Type: String
    Description: Full ECR image URI for the backend (e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/fyp-backend:latest)

  FrontendImageUri:
    Type: String
    Description: Full ECR image URI for the frontend (e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/fyp-frontend:latest)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC ID (queried by Makefile)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs in the default VPC (queried by Makefile)

Resources:

  # ---------------------------------------------------------------------------
  # CloudWatch Log Groups — captures stdout/stderr from containers
  # ---------------------------------------------------------------------------

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/backend
      RetentionInDays: 30

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/frontend
      RetentionInDays: 30

  # ---------------------------------------------------------------------------
  # ECS Cluster — logical grouping for Fargate tasks
  # ---------------------------------------------------------------------------

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster
      CapacityProviders:
        - FARGATE
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ---------------------------------------------------------------------------
  # Cloud Map — private DNS so Streamlit can reach FastAPI by name internally
  # FastAPI is reachable at http://fastapi.fyp.local:8000 inside the VPC
  # ---------------------------------------------------------------------------

  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub ${ProjectName}.local
      Vpc: !Ref VpcId

  CloudMapService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: fastapi
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Security Groups — controls which traffic is allowed in/out of each resource
  # ---------------------------------------------------------------------------

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - allow inbound HTTP on port 80 (Streamlit) and 8000 (FastAPI)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0

  FrontendTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Frontend ECS task - allow inbound from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  BackendTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Backend ECS task - allow inbound from ALB and Streamlit task
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref FrontendTaskSecurityGroup

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # Port 80  → Streamlit (frontend)
  # Port 8000 → FastAPI  (backend)
  # ---------------------------------------------------------------------------

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref SubnetIds

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-backend-tg
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /health/ready
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-frontend-tg
      Port: 8501
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /_stcore/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  FrontendListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  BackendListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 8000
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ---------------------------------------------------------------------------
  # Task Definitions — blueprint for running each container on Fargate
  # Sized at 256 CPU / 512 MB based on docker stats measurements:
  #   backend:  ~116 MB actual | frontend: ~52 MB actual
  # ---------------------------------------------------------------------------

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-backend
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend

  FrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-frontend
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: frontend
          Image: !Ref FrontendImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              Protocol: tcp
          Environment:
            - Name: BACKEND_URL
              Value: !Sub http://fastapi.${ProjectName}.local:8000
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend

  # ---------------------------------------------------------------------------
  # ECS Services — keeps tasks running and registers them with ALB + Cloud Map
  # ---------------------------------------------------------------------------

  BackendService:
    Type: AWS::ECS::Service
    DependsOn: BackendListener
    Properties:
      ServiceName: !Sub ${ProjectName}-backend
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref BackendTaskSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 8000
          TargetGroupArn: !Ref BackendTargetGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt CloudMapService.Arn
      HealthCheckGracePeriodSeconds: 60

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn: FrontendListener
    Properties:
      ServiceName: !Sub ${ProjectName}-frontend
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref FrontendTaskSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 8501
          TargetGroupArn: !Ref FrontendTargetGroup
      HealthCheckGracePeriodSeconds: 30

Outputs:
  ECSClusterName:
    Value: !Ref ECSCluster
    Description: ECS cluster name — used by Makefile and GitHub Actions

  BackendServiceName:
    Value: !GetAtt BackendService.Name
    Description: Backend ECS service name — used by GitHub Actions deploy job

  FrontendServiceName:
    Value: !GetAtt FrontendService.Name
    Description: Frontend ECS service name — used by GitHub Actions deploy job

  ALBDNSName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Description: Demo URLs — Streamlit at port 80, FastAPI docs at port 8000
