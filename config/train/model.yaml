# @package train_model

# Fully qualified class path — Hydra uses this to instantiate the model.
# Change this to swap models without touching any Python code.
# e.g. sklearn.ensemble.RandomForestRegressor
_target_: xgboost.XGBRegressor

# XGBoost hyperparameters — tuned via GridSearchCV in notebook 09a
n_estimators: 255
max_depth: 9
learning_rate: 0.06365809860150928
subsample: 0.7122309235479088
colsample_bytree: 0.7571587321755668
min_child_weight: 2
reg_alpha: 0.7219848618365451
reg_lambda: 1.7728100146279093
random_state: 42
n_jobs: -1
verbosity: 0

