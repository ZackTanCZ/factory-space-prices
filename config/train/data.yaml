# @package train_data

# Path to the feature-engineered dataset (output of notebook 04/04a)
input_path: data/processed/factory_engineered.csv

# Target column to predict — raw price per square foot in SGD
target_col: "Unit Price ($ psf)"

# Fraction of data held out for evaluation
test_size: 0.2

# Seed for reproducible train/test split
random_state: 42

# Column to apply target encoding — replaced with mean target value per category
target_encode_col: "Planning Area"

# Columns to one-hot encode — drop='first' applied to avoid multicollinearity
cat_cols:
  - Region
  - Floor Level
  - Type of Sale

# Columns dropped before training
# All macro features removed — no-macro model is champion per notebook 09a ablation study
# Identifier columns removed as they carry no predictive signal
drop_cols:
  # Identifiers — no predictive signal
  - Contract Date
  - Project Name
  - Street Name
  - nearest_mrt
  # Target variant — for linear models only, not used by XGBoost
  - Log_Unit_Price
  # Data leakage — Industrial Property Price Index is derived from the same market being predicted
  - Price_Index
  # Macro: economic
  - GDP_YoY_Growth_Rate
  - CPI_All_Items
  - Unemployment_Rate
  # Macro: interest rates / bond yields
  - 1Y_TBills
  - 2Y_Bond_Yield
  - 5Y_Bond_Yield
  - 10Y_Bond_Yield
  - 15Y_Bond_Yield
  - 20Y_Bond_Yield
  - SORA_3M_Compounded
  # Macro: construction costs
  - Cement_Bulk_Per_Tonne
  - Steel_Rebar_Per_Tonne
  - Granite_20mm_Per_Tonne
  - Concreting_Sand_Per_Tonne
  - Ready_Mixed_Concrete_Per_m3
